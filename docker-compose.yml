# OpenMetadata — local stack (Postgres + Elasticsearch + Airflow), all via Docker Compose.
#
# Pinned to OpenMetadata 1.10.0 -> Airflow 2.10.5 (closest official to the deployed 2.10.3)
# and PostgreSQL 16.6, to reproduce deployed behaviour locally. See README "Версии".
#
# Env var NAMES mirror the DevOps task definition (DB_HOST/DB_PORT/DB_USER/DB_PASSWORD/
# DB_SCHEME/DB_DRIVER_CLASS/OM_DATABASE/ENVIRONMENT). Values default to a working local
# setup; override via .env. For EKS, just point these at the managed services
# (see docs/ENVIRONMENT.md). NOTE: OM internally reads DB_USER_PASSWORD, so we map it
# from the DevOps-named DB_PASSWORD below.
name: openmetadata-local

x-om-db-env: &om-db-env
  # --- Database (DevOps names; DB_PASSWORD -> OM's internal DB_USER_PASSWORD) ---
  DB_DRIVER_CLASS: ${DB_DRIVER_CLASS:-org.postgresql.Driver}
  DB_SCHEME: ${DB_SCHEME:-postgresql}
  DB_PARAMS: ${DB_PARAMS:-allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
  DB_HOST: ${DB_HOST:-postgresql}
  DB_PORT: ${DB_PORT:-5432}
  DB_USER: ${DB_USER:-openmetadata_user}
  DB_USER_PASSWORD: ${DB_PASSWORD:-openmetadata_password}
  OM_DATABASE: ${OM_DATABASE:-openmetadata_db}
  ENVIRONMENT: ${ENVIRONMENT:-local}
  # --- Search (local Elasticsearch; for EKS point at the managed search) ---
  SEARCH_TYPE: ${SEARCH_TYPE:-elasticsearch}
  ELASTICSEARCH_HOST: ${ELASTICSEARCH_HOST:-elasticsearch}
  ELASTICSEARCH_PORT: ${ELASTICSEARCH_PORT:-9200}
  ELASTICSEARCH_SCHEME: ${ELASTICSEARCH_SCHEME:-http}

services:
  postgresql:
    container_name: openmetadata_postgresql
    image: postgres:${POSTGRES_VERSION:-16.6}
    restart: unless-stopped
    command: "--work_mem=10MB"
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-password}
      # consumed by init/postgres-init.sh to create the OM + Airflow databases/users:
      DB_USER: ${DB_USER:-openmetadata_user}
      DB_PASSWORD: ${DB_PASSWORD:-openmetadata_password}
      OM_DATABASE: ${OM_DATABASE:-openmetadata_db}
      AIRFLOW_DB: ${AIRFLOW_DB:-airflow_db}
      AIRFLOW_DB_USER: ${AIRFLOW_DB_USER:-airflow_user}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow_pass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init/postgres-init.sh:/docker-entrypoint-initdb.d/10-init.sh:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks: [app_net]
    healthcheck:
      test: ["CMD-SHELL", "psql -U $${POSTGRES_USER} -tAc 'select 1' -d $${OM_DATABASE}"]
      interval: 15s
      timeout: 10s
      retries: 10

  elasticsearch:
    container_name: openmetadata_elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION:-8.11.4}
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1024m -Xmx1024m
      - xpack.security.enabled=false
    ports:
      - "${ES_PORT:-9200}:9200"
    networks: [app_net]
    healthcheck:
      test: "curl -s http://localhost:9200/_cluster/health?pretty | grep status | grep -qE 'green|yellow' || exit 1"
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - es-data:/usr/share/elasticsearch/data

  # One-shot schema migration. The server waits for this to finish (exit 0).
  execute-migrate-all:
    container_name: openmetadata_migrate
    image: docker.getcollate.io/openmetadata/server:${OPENMETADATA_VERSION:-1.10.0}
    command: "./bootstrap/openmetadata-ops.sh migrate"
    environment:
      <<: *om-db-env
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    networks: [app_net]

  openmetadata-server:
    container_name: openmetadata_server
    image: docker.getcollate.io/openmetadata/server:${OPENMETADATA_VERSION:-1.10.0}
    environment:
      <<: *om-db-env
      OPENMETADATA_CLUSTER_NAME: ${OPENMETADATA_CLUSTER_NAME:-openmetadata}
      # --- Pipeline service = the local Airflow below (for EKS point at the real one) ---
      PIPELINE_SERVICE_CLIENT_ENABLED: ${PIPELINE_SERVICE_CLIENT_ENABLED:-true}
      PIPELINE_SERVICE_CLIENT_ENDPOINT: ${PIPELINE_SERVICE_CLIENT_ENDPOINT:-http://ingestion:8080}
      SERVER_HOST_API_URL: ${SERVER_HOST_API_URL:-http://openmetadata-server:8585/api}
      AIRFLOW_USERNAME: ${AIRFLOW_USERNAME:-admin}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
      FERNET_KEY: ${FERNET_KEY:-jJ/9sz0g0OHxsfxOoSfdFdmk3ysNmPRnH3TUAbz3IHA=}
      OPENMETADATA_HEAP_OPTS: ${OPENMETADATA_HEAP_OPTS:--Xmx1G -Xms1G}
    ports:
      - "${OM_SERVER_PORT:-8585}:8585"
      - "${OM_ADMIN_PORT:-8586}:8586"
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      execute-migrate-all:
        condition: service_completed_successfully
    networks: [app_net]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8586/healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Airflow 2.10.5 (OpenMetadata ingestion image incl. the managed-apis plugin).
  ingestion:
    container_name: openmetadata_ingestion
    image: docker.getcollate.io/openmetadata/ingestion:${OPENMETADATA_VERSION:-1.10.0}
    depends_on:
      postgresql:
        condition: service_healthy
      openmetadata-server:
        condition: service_started
    environment:
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__OPENMETADATA_AIRFLOW_APIS__DAG_GENERATED_CONFIGS: "/opt/airflow/dag_generated_configs"
      # Airflow's own metadata DB (its own instance for now; set your own / fill for EKS)
      DB_HOST: ${AIRFLOW_DB_HOST:-postgresql}
      DB_PORT: ${AIRFLOW_DB_PORT:-5432}
      AIRFLOW_DB: ${AIRFLOW_DB:-airflow_db}
      DB_USER: ${AIRFLOW_DB_USER:-airflow_user}
      DB_SCHEME: ${AIRFLOW_DB_SCHEME:-postgresql+psycopg2}
      DB_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow_pass}
    entrypoint: /bin/bash
    command:
      - "/opt/airflow/ingestion_dependency.sh"
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    networks: [app_net]
    volumes:
      - ingestion-dags:/opt/airflow/dags
      - ingestion-dag-configs:/opt/airflow/dag_generated_configs
      - ingestion-tmp:/tmp

volumes:
  postgres-data:
  es-data:
  ingestion-dags:
  ingestion-dag-configs:
  ingestion-tmp:

networks:
  app_net:
